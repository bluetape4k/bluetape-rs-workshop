<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="780" viewBox="0 0 1480 780" role="img" aria-labelledby="title desc">
  <title id="title">Milestone 0.2.0 Collections + Async Architecture</title>
  <desc id="desc">The second lane keeps validation and logging, then adds deterministic collections and bounded Tokio control.</desc>
  <defs>
    <filter id="frame-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#b7c7d1" flood-opacity="0.22"/></filter>
    <marker id="arrow-main" viewBox="0 0 5 5" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#47616f"/></marker>
    <marker id="arrow-success" viewBox="0 0 5 5" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#4f8b63"/></marker>
    <marker id="arrow-error" viewBox="0 0 5 5" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#b95f7a"/></marker>
    <marker id="arrow-amber" viewBox="0 0 5 5" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto"><path d="M 0.5 0.5 L 4.5 2.5 L 0.5 4.5 Z" fill="#a78335"/></marker>
    <style>
      @font-face { font-family: 'Architects Daughter'; src: url('file:///Users/debop/Library/Fonts/ArchitectsDaughter-Regular.ttf') format('truetype'); }
      @font-face { font-family: 'Comic Mono'; src: url('file:///Users/debop/Library/Fonts/ComicMono.ttf') format('truetype'); }
      .title { font-family: 'Architects Daughter'; font-size: 38px; fill: #243845; }
      .subtitle, .detail, .route-label, .footer { font-family: 'Comic Mono'; fill: #536d7d; }
      .subtitle { font-size: 15px; }
      .card-title, .band-label { font-family: 'Architects Daughter'; fill: #243845; }
      .card-title { font-size: 22px; }
      .band-label { font-size: 21px; }
      .detail { font-size: 14px; }
      .route-label { font-size: 13px; }
      .footer { font-size: 14px; }
      .band { fill: #ffffff; stroke: #d8e2e8; stroke-width: 2; rx: 16; }
      .line-main { fill: none; stroke: #47616f; stroke-width: 3; marker-end: url(#arrow-main); }
      .line-success { fill: none; stroke: #4f8b63; stroke-width: 3; marker-end: url(#arrow-success); }
      .line-error { fill: none; stroke: #b95f7a; stroke-width: 3; marker-end: url(#arrow-error); }
      .line-amber { fill: none; stroke: #a78335; stroke-width: 3; marker-end: url(#arrow-amber); }
    </style>
  </defs>
  <rect width="1480" height="780" fill="#fbfaf6"/>
  <rect x="24" y="22" width="1432" height="736" rx="26" fill="#ffffff" stroke="#c9d8e2" stroke-width="2.5" filter="url(#frame-shadow)"/>
  <text class="title" x="740" y="58" text-anchor="middle">Milestone 0.2.0 Collections + Async Architecture</text>
  <text class="subtitle" x="740" y="92" text-anchor="middle">The second lane keeps validation and logging, then adds deterministic collections and bounded Tokio control.</text>

  <rect class="band" x="56" y="136" width="1368" height="124"/>
  <text class="band-label" x="92" y="172">0.1.0 Baseline</text>
  <rect class="band" x="56" y="304" width="1368" height="208"/>
  <text class="band-label" x="92" y="340">0.2.0 Examples</text>
  <rect class="band" x="56" y="558" width="1368" height="132"/>
  <text class="band-label" x="92" y="594">bluetape-rs Libraries</text>
  <g id="baseline">
    <rect x="112" y="178" width="300" height="72" rx="12" fill="#d7ecf2" stroke="#48758d" stroke-width="2"/>
    <text class="card-title" x="262" y="204" text-anchor="middle">0.1.0 Baseline</text>
    <text class="detail" x="262" y="234" text-anchor="middle">validation + logging + tests</text>
  </g>
  <g id="windowing">
    <rect x="164" y="374" width="314" height="88" rx="12" fill="#dbe8d4" stroke="#5d8a62" stroke-width="2"/>
    <text class="card-title" x="321" y="408" text-anchor="middle">batched-order-windowing</text>
    <text class="detail" x="321" y="438" text-anchor="middle">group + chunk + page</text>
  </g>
  <g id="catalog">
    <rect x="584" y="374" width="340" height="88" rx="12" fill="#f7e5aa" stroke="#b99b5d" stroke-width="2"/>
    <text class="card-title" x="754" y="408" text-anchor="middle">catalog-enrichment-fanout</text>
    <text class="detail" x="754" y="438" text-anchor="middle">bounded provider fan-out</text>
  </g>
  <g id="worker">
    <rect x="1030" y="374" width="300" height="88" rx="12" fill="#eadcf5" stroke="#8a6bb0" stroke-width="2"/>
    <text class="card-title" x="1180" y="408" text-anchor="middle">shutdown-aware-worker</text>
    <text class="detail" x="1180" y="438" text-anchor="middle">timeout + shutdown</text>
  </g>
  <g id="core">
    <rect x="140" y="608" width="264" height="64" rx="12" fill="#edf1e9" stroke="#91a08c" stroke-width="2"/>
    <text class="card-title" x="272" y="630" text-anchor="middle">bluetape-rs-core</text>
    <text class="detail" x="272" y="660" text-anchor="middle">input validation</text>
  </g>
  <g id="collections">
    <rect x="476" y="608" width="330" height="64" rx="12" fill="#edf1e9" stroke="#91a08c" stroke-width="2"/>
    <text class="card-title" x="641" y="630" text-anchor="middle">bluetape-rs-collections</text>
    <text class="detail" x="641" y="660" text-anchor="middle">group_by + chunks + Page</text>
  </g>
  <g id="async">
    <rect x="878" y="608" width="320" height="64" rx="12" fill="#edf1e9" stroke="#91a08c" stroke-width="2"/>
    <text class="card-title" x="1038" y="630" text-anchor="middle">bluetape-rs-async</text>
    <text class="detail" x="1038" y="660" text-anchor="middle">fan-out + timeout + signal</text>
  </g>
  <path class="line-main" d="M 262 250 L 262 374"/>
  <text class="route-label" x="262" y="302" text-anchor="middle">validated rows</text>
  <path class="line-amber" d="M 412 214 L 754 214 L 754 374"/>
  <text class="route-label" x="583" y="284" text-anchor="middle">request context</text>
  <path class="line-success" d="M 478 418 L 584 418"/>
  <text class="route-label" x="531" y="408" text-anchor="middle">paged rows</text>
  <path class="line-amber" d="M 924 418 L 1030 418"/>
  <text class="route-label" x="977" y="408" text-anchor="middle">async contract</text>
  <path class="line-main" d="M 272 608 L 272 462"/>
  <path class="line-success" d="M 570 608 L 570 528 L 321 528 L 321 462"/>
  <path class="line-success" d="M 641 608 L 641 462"/>
  <path class="line-amber" d="M 984 608 L 984 548 L 840 548 L 840 462"/>
  <path class="line-amber" d="M 1180 608 L 1180 462"/>
  <rect x="270" y="710" width="940" height="38" rx="11" fill="#edf1e9" stroke="#5d8a62"/>
  <text class="footer" x="740" y="735" text-anchor="middle">Each crate stays independent: learners can run one focused example or the full workspace gate.</text>
</svg>
